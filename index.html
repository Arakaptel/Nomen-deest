<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
:root{
--primary:#738C9B;
--card:#000A35;
--bg:#000000;
--text:#C4C4C4;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:Audiowide,sans-serif;padding:12px}
header{text-align:center}
#clock{font-size:2rem;margin:10px 0;color:var(--primary)}
#search{width:100%;padding:12px;border:1px solid var(--primary);background:var(--card);color:var(--text);border-radius:10px}
details{margin:12px 0}
summary{color:var(--primary);font-size:1.1rem;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.card{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);background:var(--card);padding:10px;border-radius:12px;border:1px solid var(--primary)}
.card:hover{box-shadow:0 0 10px var(--primary)}
img{width:20px;height:20px}
</style>
</head>
<body>
<header>
<h1>Dashboard</h1>
<div id="clock"></div>
<input id="search" placeholder="Pesquisar atalhos...">
</header>

<details open><summary>Todos os Links</summary><div class="grid" id="links"></div></details>

<script>
const data=[
["PlaySearch","https://playsearch.kaki87.net/"],
["Vivo Ads","https://internetgratis.vivo.com.br/#/home"],
["Email Temporário","https://www.invertexto.com/gerador-email-temporario"],
["YouTube","https://m.youtube.com/"],
["TinEye","https://tineye.com/"],
["MyInstants","https://www.myinstants.com/pt/index/br/"],
["Venice AI","https://venice.ai/"],
["VirusTotal","https://www.virustotal.com/gui/home/upload"],
["StackEdit","https://stackedit.io/"],
["Reddit","https://www.reddit.com/"],
["Steam Workshop","https://steamcommunity.com/profiles/76561198767980433/myworkshopfiles?browsefilter=mysubscriptions"],
["Virgil Search APK","https://virgil.samidy.com/Mobile/#gsc.tab=0&gsc.sort=&gsc.q=Cat%20quest"],
["RapidSave","https://rapidsave.com/"],
["SaveInsta","https://saveclip.app/pt"],
["FDown","https://fdown.net/pt/download.php"],
["Pinterest","https://www.pinterest.com/"],
["Facebook","https://m.facebook.com/"],
["Photopea","https://www.photopea.com/"],
["Instagram","https://www.instagram.com/"],
["F-Droid","https://f-droid.org/pt_BR/packages/"],
["PinDown","https://pindown.io/pt1"],
["Pirataria Megathread","https://pirataria.link/"],
["4Devs","https://www.4devs.com.br/"],
["DeviantArt","https://www.deviantart.com/"],
["KRESKA.art","https://kreska.art/"],
["RetroPad Editor","https://valent-in.github.io/retropad-editor/"]
["Serebii Spindex","https://serebii.net/spindex/"]
["Calculadora data","https://www.supercalendario.com.br/calculadora-data
];

const container=document.getElementById("links");

function render(filter=""){
container.innerHTML="";
data.filter(([n])=>n.toLowerCase().includes(filter.toLowerCase()))
.forEach(([name,url])=>{
const a=document.createElement("a");
a.href=url;a.className="card";
a.innerHTML=`<img src="https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64">${name}`;
container.appendChild(a);
});
}
render();

document.getElementById("search").addEventListener("input",e=>render(e.target.value));

setInterval(()=>{
document.getElementById("clock").textContent=new Date().toLocaleTimeString("pt-BR");
},1000);
</script>
</body>
</html>
