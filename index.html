<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
:root{
--primary:#738C9B;
--card:#000A35;
--bg:#000000;
--text:#C4C4C4;
}
body{
    margin:0;
    min-height:100vh;
    padding:12px;
    font-family:Audiowide,sans-serif;
    color:var(--text);

    background:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.75)
        ),
        url("jackfrost.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

header{
    text-align:center;
    max-width:900px;
    margin:auto;
}

h1{
    color:var(--primary);
    text-shadow:
        0 0 10px var(--primary),
        0 0 20px var(--primary);

}

/* Pesquisa Google */
#google-search{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid var(--primary);
    background:var(--card);
    color:var(--text);
    backdrop-filter:blur(8px);
    outline:none;
    font-family:inherit;
}

#google-search:focus{
    box-shadow:0 0 20px var(--primary);
}

/* Pesquisa de atalhos */
#search{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--primary);
    background:var(--card);
    color:var(--text);
    backdrop-filter:blur(8px);
    outline:none;
    font-family:inherit;
}

#search:focus{
    box-shadow:0 0 20px var(--primary);
}

details{
    max-width:1200px;
    margin:20px auto;
}

summary{
    cursor:pointer;
    color:var(--primary);
    font-size:1.1rem;
    margin-bottom:10px;
    text-shadow:0 0 10px var(--primary);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:12px;
    margin-top:10px;
}

.card{
    display:flex;
    align-items:center;
    gap:10px;

    text-decoration:none;
    color:var(--text);

    padding:12px;

    background:var(--card);
    backdrop-filter:blur(10px);

    border-radius:14px;

    border:1px solid rgba(115,140,155,.45);

    transition:.25s ease;
}
}

.card:hover{
    transform:translateY(-3px);

    box-shadow:
        0 0 10px #8fb8d1,
        0 0 20px #8fb8d1,
        0 0 35px rgba(143,184,209,.5);
}

.card img{
    width:24px;
    height:24px;
}

footer{
    text-align:center;
    margin-top:30px;
    opacity:.8;
    font-size:.8rem;
}
</style>

</head>

<body>

<header>
    <h1>Atalhos</h1>

<form action="https://www.google.com/search" method="GET" target="_blank">
    <input
        id="google-search"
        name="q"
        placeholder="Pesquisar no Google..."
        autocomplete="off">
</form>

</header>

<details open>
    <summary>Todos os Links</summary>
    <div class="grid" id="links"></div>
</details>

<script>
const data=[
["PlaySearch","https://playsearch.kaki87.net/"],
["Vivo Ads","https://internetgratis.vivo.com.br/#/home"],
["Email Temporário","https://www.invertexto.com/gerador-email-temporario"],
["YouTube","https://m.youtube.com/"],
["Invidious","https://inv.nadeko.net/feed/popular"],
["TinEye","https://tineye.com/"],
["MyInstants","https://www.myinstants.com/pt/index/br/"],
["Venice AI","https://venice.ai/"],
["VirusTotal","https://www.virustotal.com/gui/home/upload"],
["StackEdit","https://stackedit.io/"],
["Sitting on Clouds","https://www.sittingonclouds.net/"],
["Reddit","https://www.reddit.com/"],
["Steam Workshop","https://steamcommunity.com/profiles/76561198767980433/myworkshopfiles?browsefilter=mysubscriptions"],
["Virgil Search APK","https://virgil.samidy.com/Mobile/#gsc.tab=0&gsc.sort=&gsc.q=Cat%20quest"],
["RapidSave","https://rapidsave.com/"],
["SaveInsta","https://saveclip.app/pt"],
["FDown","https://fdown.net/pt/download.php"],
["Pinterest","https://www.pinterest.com/"],
["Facebook","https://m.facebook.com/"],
["Photopea","https://www.photopea.com/"],
["Instagram","https://www.instagram.com/"],
["F-Droid","https://f-droid.org/pt_BR/packages/"],
["PinDown","https://pindown.io/pt1"],
["Pirataria Megathread","https://pirataria.link/"],
["4Devs","https://www.4devs.com.br/"],
["DeviantArt","https://www.deviantart.com/"],
["KRESKA.art","https://kreska.art/"],
["RetroPad Editor","https://valent-in.github.io/retropad-editor/"],
["Serebii Spindex","https://serebii.net/spindex/"],
["Calculadora data","https://www.supercalendario.com.br/calculadora-data"],
["Arakaptel","https://github.com/Arakaptel/Nomen-deest/"]
];


const container = document.getElementById("links");

function render(filter = ""){
    container.innerHTML = "";

    data
    .filter(([name]) =>
        name.toLowerCase().includes(filter.toLowerCase())
    )
    .forEach(([name,url]) => {

        const a = document.createElement("a");

        a.href = url;
        a.target = "_blank";
        a.className = "card";

        a.innerHTML = `
            <img src="https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64">
            <span>${name}</span>
        `;

        container.appendChild(a);
    });
}

render();

document
.getElementById("search")
.addEventListener("input", e => {
    render(e.target.value);
});


</script>

</body>
</html>
